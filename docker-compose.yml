# Local development stack for the concierge platform.
# Hanan owns: postgres, redis, vault, minio, and tenant-safe infrastructure.
# Mohammad owns: router, rag, agent, and memory services.
# Ali Faddel owns: widget and admin app container wiring.
# Rayan owns: modelserver and eval containers.

services:
  postgres:
    image: postgres:16-alpine
    container_name: concierge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-concierge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-concierge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: concierge-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./infrastructure/redis/config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: concierge-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  vault:
    image: hashicorp/vault:1.17
    container_name: concierge-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-dev", "-dev-root-token-id=${VAULT_TOKEN:-change-me}"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-change-me}
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: concierge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-concierge}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      VAULT_TOKEN: ${VAULT_TOKEN:-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: admin
      dockerfile: Dockerfile
    container_name: concierge-admin
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-smoke:
    image: python:3.12-slim
    profiles: ["smoke"]
    working_dir: /workspace
    volumes:
      - .:/workspace:ro
    environment:
      PYTHONPATH: /workspace
    command:
      [
        "python",
        "-c",
        "from apps.api.app.main import build_platform_application; print(build_platform_application().summary())"
      ]
    depends_on:
      - postgres
      - redis
      - minio
      - vault

volumes:
  postgres_data:
  minio_data:

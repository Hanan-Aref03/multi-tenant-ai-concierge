# Hanan owns Redis session and cache safety for the platform boundary.

bind 0.0.0.0
protected-mode yes
port 6379
timeout 0
tcp-keepalive 300
databases 16
save ""
appendonly no
maxmemory 256mb
maxmemory-policy allkeys-lru
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
